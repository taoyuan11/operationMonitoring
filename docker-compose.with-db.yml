# Default self-contained deployment with a PostgreSQL service.
name: operation-monitoring

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-operation_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-operation_monitoring}
      POSTGRES_PASSWORD: ${OM_DATABASE_PASSWORD:?set OM_DATABASE_PASSWORD}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --username="$${POSTGRES_USER}" --dbname="$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OM_BIND: 0.0.0.0:13500
      OM_DATABASE_URL: postgresql://${POSTGRES_USER:-operation_monitoring}@postgres:5432/${POSTGRES_DB:-operation_monitoring}
      OM_DATABASE_PASSWORD: ${OM_DATABASE_PASSWORD:?set OM_DATABASE_PASSWORD}
      OM_ADMIN_PASSWORD: ${OM_ADMIN_PASSWORD:-admin123}
      OM_AUTH_KEY_FILE: /app/db/auth-secret.key
      OM_SECURE_COOKIES: ${OM_SECURE_COOKIES:-false}
      OM_UPLOAD_DIR: /app/uploads
      OM_UPDATE_DIR: /app/updates
      OM_AGENT_PACKAGE_MAX_BYTES: ${OM_AGENT_PACKAGE_MAX_BYTES:-268435456}
      OM_FILE_TRANSFER_MAX_BYTES: ${OM_FILE_TRANSFER_MAX_BYTES:-1073741824}
      RUST_LOG: ${RUST_LOG:-backend=info,tower_http=info}
    ports:
      - "${BACKEND_PORT:-13500}:13500"
    volumes:
      - backend-db:/app/db
      - backend-uploads:/app/uploads
      - backend-updates:/app/updates
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-1g}
    ports:
      - "${FRONTEND_PORT:-13501}:80"
    restart: unless-stopped

volumes:
  postgres-data:
  backend-db:
  backend-uploads:
  backend-updates:
